<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('msg');
const timerEl = document.getElementById('timer');
const triesEl = document.getElementById('tries');
const winOverlay = document.getElementById('winOverlay');
const winTimeEl = document.getElementById('winTime');
const W = 640, H = 360, CR = 8, TW = 26;

const levels = [
  [{x:100,y:180},{x:160,y:180},{x:160,y:80},{x:280,y:80},
   {x:280,y:180},{x:200,y:180},{x:200,y:280},{x:360,y:280},
   {x:360,y:140},{x:460,y:140},{x:460,y:250},{x:540,y:250},{x:540,y:180}],

];

let level=0,pts=[],state='idle',mx=-1,my=-1;
let startTime=0,elapsed=0,tries=0,resetting=false;

function buildPath(){pts=levels[level].map(p=>({...p}));}

function buildRects(){
  const r=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    if(a.x===b.x){const y0=Math.min(a.y,b.y),y1=Math.max(a.y,b.y);r.push({x:a.x-TW/2,y:y0-TW/2,w:TW,h:y1-y0+TW,vert:true});}
    else{const x0=Math.min(a.x,b.x),x1=Math.max(a.x,b.x);r.push({x:x0-TW/2,y:a.y-TW/2,w:x1-x0+TW,h:TW,vert:false});}
  }
  return r;
}

function isOnCable(px,py,r){
  for(const s of buildRects())
    if(px>=s.x+r&&px<=s.x+s.w-r&&py>=s.y+r&&py<=s.y+s.h-r) return true;
  return false;
}

function drawCable(){
  const rects=buildRects();
  ctx.save();ctx.shadowColor='rgba(80,80,180,.25)';ctx.shadowBlur=10;
  for(const s of rects){ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.roundRect(s.x-3,s.y-3,s.w+6,s.h+6,8);ctx.fill();}
  ctx.restore();
  for(const s of rects){
    const g=s.vert?ctx.createLinearGradient(s.x,0,s.x+s.w,0):ctx.createLinearGradient(0,s.y,0,s.y+s.h);
    g.addColorStop(0,'#2a2a3a');g.addColorStop(.35,'#1e1e2e');g.addColorStop(.65,'#1e1e2e');g.addColorStop(1,'#2a2a3a');
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(s.x,s.y,s.w,s.h,TW/2);ctx.fill();
    if(s.vert){ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(s.x+4,s.y+TW/2,4,s.h-TW);}
    else{ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(s.x+TW/2,s.y+4,s.w-TW,4);}
  }
  for(let i=1;i<pts.length-1;i++){
    const p=pts[i];
    const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,TW/2+3);
    g2.addColorStop(0,'rgba(255,255,255,.18)');g2.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,TW/2+3,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
    const g3=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,TW/2);
    g3.addColorStop(0,'#2a2a3a');g3.addColorStop(1,'#1e1e2e');
    ctx.beginPath();ctx.arc(p.x,p.y,TW/2,0,Math.PI*2);ctx.fillStyle=g3;ctx.fill();
  }
}

function drawPhone(){
  const p=pts[0];
  const px=p.x-58,py=p.y-42,pw=48,ph=84;
  ctx.fillStyle='#1a1a2e';ctx.strokeStyle=state==='idle'?'#664444':'#444';ctx.lineWidth=state==='idle'?2:1.5;
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#1a3060';ctx.fillRect(px+4,py+8,pw-8,ph-20);
  ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('☠️',px+pw/2,p.y+7);
  ctx.fillStyle='#ff6666';ctx.font='bold 6px monospace';ctx.fillText('VIRUS',px+pw/2,p.y+20);
  if(state==='idle'){
    ctx.fillStyle='rgba(255,80,80,.12)';ctx.beginPath();ctx.arc(px+pw/2,p.y,38,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,80,80,.35)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.arc(px+pw/2,p.y,38,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
}

function drawPC(){
  const p=pts[pts.length-1];
  const mx2=p.x+10,my2=p.y-28,mw=78,mh=54;
  ctx.fillStyle='#1a1a2e';ctx.strokeStyle='#444';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(mx2,my2,mw,mh,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='#111827';ctx.fillRect(mx2+4,my2+4,mw-8,mh-14);
  ctx.fillStyle='#22c55e';ctx.font='6px monospace';ctx.textAlign='left';ctx.fillText('> ready',mx2+7,my2+15);
  ctx.fillStyle='#444';ctx.fillText('> waiting...',mx2+7,my2+27);
  ctx.fillStyle='#333';ctx.fillRect(mx2+mw/2-14,my2+mh-5,28,4);ctx.fillRect(mx2+mw/2-22,my2+mh-1,44,3);
}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  drawCable();drawPhone();drawPC();
  const sp=pts[0],ep=pts[pts.length-1];
  ctx.fillStyle='#888';ctx.fillRect(sp.x-TW/2,sp.y-5,TW/2+2,10);ctx.fillStyle='#aaa';ctx.fillRect(sp.x-TW/2+2,sp.y-3,TW/2-2,6);
  ctx.fillStyle='#888';ctx.fillRect(ep.x,ep.y-5,TW/2,10);ctx.fillStyle='#aaa';ctx.fillRect(ep.x+2,ep.y-3,TW/2-4,6);
  if(mx>0&&my>0){
    const grd=ctx.createRadialGradient(mx,my,0,mx,my,CR*2.5);
    grd.addColorStop(0,'rgba(255,50,50,.5)');grd.addColorStop(1,'rgba(255,50,50,0)');
    ctx.beginPath();ctx.arc(mx,my,CR*2.5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    ctx.beginPath();ctx.arc(mx,my,CR,0,Math.PI*2);ctx.fillStyle='#ff2222';ctx.fill();
    ctx.strokeStyle='#ff9999';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('☠',mx,my+3);
  }
}

function isOnPhone(x,y){const p=pts[0];return Math.sqrt((x-(p.x-34))**2+(y-p.y)**2)<40;}
function isAtEnd(x,y){const p=pts[pts.length-1];return Math.sqrt((x-p.x)**2+(y-p.y)**2)<TW/2+4;}

function showWin(){
  winTimeEl.textContent='הוירוס הועבר תוך '+elapsed.toFixed(1)+' שניות 🎉';
  winOverlay.classList.add('show');
}

function triggerFail(){
  if(resetting)return;
  resetting=true;state='fail';
  msgEl.className='msg fail';msgEl.textContent='💥 נגעת בקיר! חזור לטלפון...';
  draw();
  setTimeout(()=>{
    state='idle';resetting=false;elapsed=0;
    timerEl.textContent='0.0s';
    msgEl.className='msg';msgEl.textContent='🖱️ הנח את העכבר על הטלפון כדי להתחיל';
    draw();
  },700);
}

function resetAll(keepTries){
  winOverlay.classList.remove('show');
  state='idle';resetting=false;elapsed=0;mx=-1;my=-1;
  timerEl.textContent='0.0s';
  msgEl.className='msg';msgEl.textContent='🖱️ הנח את העכבר על הטלפון כדי להתחיל';
  if(!keepTries){tries=0;triesEl.textContent='0';}
  buildPath();draw();
}

canvas.addEventListener('mousemove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width, scaleY=H/rect.height;
  mx=(e.clientX-rect.left)*scaleX;
  my=(e.clientY-rect.top)*scaleY;
  if(state==='idle'&&isOnPhone(mx,my)){
    state='playing';startTime=Date.now();tries++;triesEl.textContent=tries;
    msgEl.className='msg';msgEl.textContent='🦠 בדרך! אל תיגע בקירות...';
  }
  if(state==='playing'){
    elapsed=(Date.now()-startTime)/1000;timerEl.textContent=elapsed.toFixed(1)+'s';
    if(isAtEnd(mx,my)){state='won';showWin();}
    else if(!isOnCable(mx,my,CR)){triggerFail();return;}
  }
  draw();
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const scaleX=W/rect.width, scaleY=H/rect.height;
  mx=(t.clientX-rect.left)*scaleX;my=(t.clientY-rect.top)*scaleY;
  if(state==='idle'&&isOnPhone(mx,my)){state='playing';startTime=Date.now();tries++;triesEl.textContent=tries;}
  if(state==='playing'){
    elapsed=(Date.now()-startTime)/1000;timerEl.textContent=elapsed.toFixed(1)+'s';
    if(isAtEnd(mx,my)){state='won';showWin();}
    else if(!isOnCable(mx,my,CR)){triggerFail();return;}
  }
  draw();
},{passive:false});
canvas.addEventListener('mouseleave',()=>{
  if(state==='playing')triggerFail();
  mx=-1;my=-1;draw();
});
document.getElementById('playAgainBtn').onclick=()=>resetAll(true);

buildPath();draw();
setInterval(()=>{if(state==='playing'){elapsed=(Date.now()-startTime)/1000;timerEl.textContent=elapsed.toFixed(1)+'s';draw();}},100);
</script>
</body>
